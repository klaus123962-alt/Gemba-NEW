<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чек-лист обхода - ОЗТЫ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
/* ============================================================
   DESIGN SYSTEM — GEMBA Checklist v2 (перенесён из GEMBA.html)
   ============================================================ */
:root {
  --brand:       #001355;
  --brand-light: #002177;
  --brand-faint: #e8edf8;
  --green:       #4CAF50;
  --green-d:     #388E3C;
  --orange:      #FF9800;
  --orange-d:    #E65100;
  --red:         #F44336;
  --red-d:       #C62828;
  --teal:        #00ACC1;
  --bg:          #f0f2f7;
  --surface:     #ffffff;
  --card-bg:     #ffffff;
  --border:      #e2e6f0;
  --text-primary:#1a2340;
  --text-sec:    #5a6585;
  --text-hint:   #9aaac5;
  --shadow-sm:   0 1px 4px rgba(0,19,85,.07);
  --shadow-md:   0 4px 16px rgba(0,19,85,.10);
  --shadow-lg:   0 8px 32px rgba(0,19,85,.14);
  --r-sm:        6px;
  --r-md:        10px;
  --r-lg:        14px;
  --transition:  all .2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ===== AUTO-SAVE INDICATOR (top-right corner) ===== */
#autosave-indicator {
  position: fixed;
  top: 14px;
  right: 16px;
  z-index: 900;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.92);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px 5px 8px;
  font-size: 12px;
  color: var(--text-sec);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(6px);
  transition: var(--transition);
  pointer-events: none;
}
#autosave-indicator .ai-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-hint);
  flex-shrink: 0;
}
#autosave-indicator.saved  .ai-dot { background: var(--green); }
#autosave-indicator.saving .ai-dot { background: var(--orange); animation: pulse-dot 1s infinite; }
#autosave-indicator.error  .ai-dot { background: var(--red); }

@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.5; transform:scale(.7); }
}

/* ===== TOAST NOTIFICATIONS ===== */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: var(--r-md);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
  animation: slideUp .3s cubic-bezier(.4,0,.2,1);
  max-width: 340px;
}
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }
.toast.warning { background: var(--orange); }
.toast.info    { background: var(--brand); }
.toast-icon { font-size: 16px; flex-shrink:0; }

@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeOut {
  from { opacity:1; }
  to   { opacity:0; transform:translateY(-8px); }
}

/* ===== OFFLINE BANNER ===== */
#offlineBadge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--orange);
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  display: none;
  z-index: 1000;
  box-shadow: var(--shadow-md);
  animation: pulse-badge 2.5s infinite;
}
#offlineBadge.show { display: flex; align-items: center; gap: 8px; }
@keyframes pulse-badge {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,152,0,.4); }
  50%      { box-shadow: 0 0 0 8px rgba(255,152,0,0); }
}

/* ===== LOADING OVERLAY ===== */
.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 3000;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
  color: #fff;
  font-size: 15px;
  backdrop-filter: blur(2px);
}
.loading-spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== MODALS ===== */
.photo-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2500;
  background: rgba(0,0,0,.88);
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.photo-modal-content {
  max-width: 90vw;
  max-height: 90vh;
  position: relative;
}
.photo-modal-content img {
  width: 100%; height: auto;
  border-radius: var(--r-md);
  display: block;
}
.close-modal {
  position: absolute;
  top: -36px;
  right: 0;
  color: rgba(255,255,255,.8);
  font-size: 32px;
  cursor: pointer;
  line-height: 1;
  transition: color .2s;
}
.close-modal:hover { color: #fff; }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2500;
  background: rgba(0,0,0,.5);
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-panel {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 28px;
  max-width: 680px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-panel h3 {
  margin: 0 0 20px;
  color: var(--brand);
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-footer {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

/* ===== BACKUP LIST ===== */
.backup-list {
  max-height: 360px;
  overflow-y: auto;
  margin: 4px 0;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.backup-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.backup-item:last-child { border-bottom: none; }
.backup-item:hover { background: var(--brand-faint); }
.backup-item .date { font-weight: 600; color: var(--brand); font-size: 14px; }
.backup-item .stats { font-size: 12px; color: var(--text-sec); margin-top: 3px; }

/* ===== APP LAYOUT ===== */
.app-wrapper {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 16px 100px;
}

/* ===== HEADER ===== */
.app-header {
  background: var(--brand);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 500;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.15);
  border-radius: var(--r-sm);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-logo svg { opacity: .9; }
.header-title-wrap { flex: 1; }
.header-title-wrap h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .3px;
}
.header-title-wrap p {
  margin: 0;
  font-size: 11px;
  opacity: .7;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.header-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  opacity: .85;
  background: rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.status-dot.offline { background: var(--orange); }
.header-history-btn {
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 7px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background .2s;
  width: auto;
  margin: 0;
}
.header-history-btn:hover { background: rgba(255,255,255,.25); }

/* ===== ROUTE BLOCK ===== */
.route-section {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin: 20px 0 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-hint);
  margin-bottom: 16px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.route-grid {
  display: grid;
  grid-template-columns: 180px 160px 1fr;
  gap: 16px;
}

/* ===== FORM ELEMENTS ===== */
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sec);
  margin-bottom: 6px;
  letter-spacing: .3px;
  text-transform: uppercase;
}
input, select, textarea {
  width: 100%;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--text-primary);
  box-sizing: border-box;
  transition: var(--transition);
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(0,19,85,.08);
}
textarea { resize: vertical; min-height: 80px; }
select { cursor: pointer; }

/* ===== BUTTONS ===== */
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 18px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 500;
  border: none;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  width: 100%;
  box-sizing: border-box;
  margin: 0;
}
button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background .15s;
}
button:hover::after { background: rgba(255,255,255,.12); }
button:active { transform: scale(.97); }
button:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none !important;
}

.btn-primary   { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-light); }
.btn-success   { background: var(--green); color: #fff; }
.btn-success:hover { background: var(--green-d); }
.btn-warning   { background: var(--orange); color: #fff; }
.btn-warning:hover { background: var(--orange-d); }
.btn-danger    { background: var(--red); color: #fff; }
.btn-danger:hover { background: var(--red-d); }
.btn-teal      { background: var(--teal); color: #fff; }
.btn-secondary {
  background: var(--bg);
  color: var(--text-primary);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }
.btn-ghost {
  background: transparent;
  color: var(--text-sec);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--bg); }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn-inline { width: auto; }
.btn-wide { width: 100%; }

/* ===== BOTTOM ACTION BAR ===== */
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  z-index: 400;
  padding: 12px 20px;
}
.action-bar-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: center;
}
.action-bar .btn-add {
  background: var(--green);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  padding: 11px 24px;
  border-radius: var(--r-md);
  flex-shrink: 0;
}
.action-bar .btn-add:hover { background: var(--green-d); }
.action-bar-secondary {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}
.action-bar-secondary button {
  flex: 1;
  min-width: 120px;
  padding: 10px 14px;
  font-size: 13px;
}
.action-bar-end {
  margin-left: auto;
}

/* ===== REMARKS GRID ===== */
#remarks {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (min-width: 1200px) {
  #remarks { grid-template-columns: 1fr 1fr; }
}

/* ===== REMARK CARD ===== */
.remark {
  background: var(--card-bg);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
  animation: cardAppear .25s cubic-bezier(.4,0,.2,1);
}
.remark:hover { box-shadow: var(--shadow-md); }

@keyframes cardAppear {
  from { opacity:0; transform:translateY(12px) scale(.98); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes cardDisappear {
  from { opacity:1; transform:scale(1); max-height:800px; }
  to   { opacity:0; transform:scale(.96); max-height:0; padding:0; margin:0; }
}
.remark.removing {
  animation: cardDisappear .25s cubic-bezier(.4,0,.2,1) forwards;
  pointer-events: none;
}

/* Remark header */
.remark-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--brand-faint);
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.remark-header:hover { background: #dde4f4; }
.remark-num {
  font-size: 13px;
  font-weight: 700;
  color: var(--brand);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.remark-num-badge {
  background: var(--brand);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}
.remark-chevron {
  color: var(--text-hint);
  font-size: 14px;
  transition: transform .2s;
}
.remark.collapsed .remark-chevron { transform: rotate(-90deg); }
.remark-del-btn {
  background: transparent;
  color: var(--red);
  border: 1.5px solid currentColor;
  border-radius: var(--r-sm);
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  width: auto;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: var(--transition);
}
.remark-del-btn:hover { background: var(--red); color: #fff; }
.remark-del-btn:active { transform: scale(.95); }

/* Remark body */
.remark-body {
  padding: 18px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.remark.collapsed .remark-body { display: none; }

/* Section within card */
.card-section {
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.card-section-head {
  background: #f7f9fc;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-sec);
  display: flex;
  align-items: center;
  gap: 7px;
  border-bottom: 1px solid var(--border);
}
.card-section-head svg { flex-shrink:0; }
.card-section-body { padding: 14px; }

/* ===== VIDEO & PHOTO ===== */
video {
  width: 100%;
  border-radius: var(--r-sm);
  background: #0a0a14;
  display: block;
  max-height: 220px;
  object-fit: cover;
}
.photo-controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.photo-controls button { flex: 1; min-width: 100px; }
.photo-preview {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.photo-preview img {
  border-radius: var(--r-sm);
  border: 2px solid var(--brand);
  cursor: zoom-in;
  object-fit: cover;
  transition: transform .2s, box-shadow .2s;
  max-width: 100%;
  max-height: 200px;
}
.photo-preview img:hover {
  transform: scale(1.03);
  box-shadow: var(--shadow-md);
}
.photo-actions {
  display: none;
  gap: 8px;
  margin-top: 10px;
}
.photo-actions button { flex: 1; }

/* ===== VOICE / RECORDING ===== */
.recording-status {
  display: none;
  padding: 10px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  border-left: 3px solid var(--orange);
  background: #fff8ee;
  color: var(--orange-d);
  align-items: center;
  gap: 10px;
}
.recording-status.recording {
  animation: status-pulse 1.5s infinite;
}
.rec-pulse {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--orange);
  flex-shrink: 0;
  animation: pulse-dot 1s infinite;
}
@keyframes status-pulse {
  0%,100% { background: #fff8ee; }
  50%      { background: #ffeecc; }
}

.voice-controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.voice-controls button { min-width: 0; }

/* Voice mode toggle */
.voice-mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 2px;
}
.voice-mode-toggle button {
  flex: 1;
  padding: 7px 10px;
  font-size: 12px;
  border-radius: 5px;
  background: transparent;
  color: var(--text-sec);
  border: none;
  transition: all .15s;
}
.voice-mode-toggle button.active {
  background: var(--surface);
  color: var(--brand);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}
.voice-mode-toggle button:hover::after { display: none; }

.replace-controls {
  display: none;
  gap: 8px;
  padding: 10px;
  background: var(--brand-faint);
  border-radius: var(--r-sm);
  border: 1px solid #b0bfe8;
}
.replace-controls button { flex: 1; }

/* ===== META GRID (responsible, location, direction) ===== */
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.meta-grid .meta-full { grid-column: 1 / -1; }
.meta-field { display: flex; flex-direction: column; gap: 5px; }

/* Flash button */
.flash-button      { background: var(--bg); color: var(--text-primary); border: 1.5px solid var(--border); }
.flash-button.on   { background: #fff8e1; color: #e65100; border-color: var(--orange); }
.flash-button.off  { background: var(--bg); }
.flash-button:hover::after { display: none; }

/* Styles for replace mode */
.text-replace-mode {
  background: var(--brand-faint) !important;
  border-color: var(--brand) !important;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1199px) {
  #remarks { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .route-grid { grid-template-columns: 1fr; gap: 12px; }
  .route-section { padding: 16px; }
  .header-inner { padding: 0 14px; }
  .header-status span { display: none; }
  .app-wrapper { padding: 0 12px 110px; }
  .action-bar { padding: 10px 12px; }
  .action-bar-inner { flex-wrap: wrap; gap: 8px; }
  .action-bar .btn-add { width: 100%; order: -1; }
  .action-bar-secondary { width: 100%; }
  .action-bar-secondary button { flex: 1 1 45%; font-size: 12px; padding: 9px 10px; }
  .voice-controls { grid-template-columns: 1fr; }
  .meta-grid { grid-template-columns: 1fr; }
  .meta-grid .meta-full { grid-column: 1; }
  .photo-controls { flex-direction: column; }
  .modal-panel { padding: 20px 16px; }
  .modal-footer { flex-direction: column; }
  .modal-footer button { width: 100%; }
  #autosave-indicator { font-size: 0; padding: 9px; top: 12px; right: 12px; }
  #autosave-indicator .ai-dot { width: 10px; height: 10px; }
}
@media (max-width: 480px) {
  .header-history-btn span { display: none; }
}
</style>
</head>
<body>

<!-- Photo zoom modal -->
<div id="photoModal" class="photo-modal">

function showToast(message, type = 'info', duration = 4000) {

  container.appendChild(toast);

];

function compressPhoto(canvas, maxWidth = 1024, quality = 0.6) {
    let width = canvas.width, height = canvas.height;
    if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width; tempCanvas.height = height;
    tempCanvas.getContext('2d').drawImage(canvas, 0, 0, width, height);
    return tempCanvas.toDataURL('image/jpeg', quality);
}

// =================== IndexedDB (скопировано из GEMBA_OZTY) ===================
class OfflineStorage {
    constructor() { this.dbName='ChecklistDB'; this.dbVersion=2; this.db=null; }
    async init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, this.dbVersion);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { this.db = request.result; resolve(); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('protocols')) {
                    const store = db.createObjectStore('protocols', { keyPath: 'id' });
                    store.createIndex('date','date',{unique:false});
                    store.createIndex('savedAt','savedAt',{unique:false});
                }
                if (!db.objectStoreNames.contains('photos')) {
                    const ps = db.createObjectStore('photos', { keyPath: 'id' });
                    ps.createIndex('protocolId','protocolId',{unique:false});
                }
            };
        });
    }
    async saveProtocol(protocolData) {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols','photos'],'readwrite');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            const protocol = { ...protocolData, savedAt: new Date().toISOString(), id: protocolData.id || `protocol_${Date.now()}_${Math.random().toString(36).substr(2,9)}` };
            const photoIndex = photoStore.index('protocolId');
            const oldPhotosRequest = photoIndex.getAll(protocol.id);
            oldPhotosRequest.onsuccess = () => {
                oldPhotosRequest.result.forEach(photo => photoStore.delete(photo.id));
                const photoPromises = [];
                if (protocol.remarks) {
                    protocol.remarks.forEach((remark, index) => {
                        if (remark.photoData || remark.photoBlob) {
                            const photoId = `photo_${Date.now()}_${index}_${Math.random().toString(36).substr(2,9)}`;
                            const photoRequest = photoStore.add({ id:photoId, protocolId:protocol.id, remarkIndex:index, photoData:remark.photoData, photoBlob:remark.photoBlob });
                            photoPromises.push(new Promise((resolvePhoto) => {
                                photoRequest.onsuccess = () => { remark.photoId=photoId; delete remark.photoData; delete remark.photoBlob; resolvePhoto(); };
                            }));
                        }
                    });
                }
                Promise.all(photoPromises).then(() => {
                    const request = protocolStore.put(protocol);
                    request.onsuccess = () => { this.cleanOldProtocols(10); resolve(protocol.id); };
                    request.onerror = () => reject(request.error);
                });
            };
            tx.onerror = (e) => reject(e.target.error);
        });
    }
    async cleanOldProtocols(keepCount=10) {
        try {
            const protocols = await this.getAllProtocols();
            if (protocols.length <= keepCount) return;
            protocols.sort((a,b) => new Date(b.savedAt)-new Date(a.savedAt));
            for (const protocol of protocols.slice(keepCount)) { await this.deleteProtocol(protocol.id); }
        } catch(error) { console.error('Ошибка очистки:',error); }
    }
    async deleteProtocol(protocolId) {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols','photos'],'readwrite');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            const photoIndex = photoStore.index('protocolId');
            photoIndex.getAll(protocolId).onsuccess = (e) => { e.target.result.forEach(photo => photoStore.delete(photo.id)); };
            const request = protocolStore.delete(protocolId);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    async loadLastProtocol() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols','photos'],'readonly');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            const index = protocolStore.index('savedAt');
            const protocols = [];
            index.openCursor(null,'prev').onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor) { protocols.push(cursor.value); if(protocols.length >= 1) return; cursor.continue(); }
            };
            tx.oncomplete = async () => {
                if (protocols.length === 0) { resolve(null); return; }
                const lastProtocol = protocols[0];
                if (lastProtocol.remarks) {
                    for (let i = 0; i < lastProtocol.remarks.length; i++) {
                        const remark = lastProtocol.remarks[i];
                        if (remark.photoId) {
                            const photoRequest = photoStore.get(remark.photoId);
                            await new Promise((resolvePhoto) => {
                                photoRequest.onsuccess = () => {
                                    const photo = photoRequest.result;
                                    if (photo) { remark.photoData = photo.photoData; remark.photoBlob = photo.photoBlob; }
                                    resolvePhoto();
                                };
                            });
                        }
                    }
                }
                resolve(lastProtocol);
            };
            tx.onerror = (e) => reject(e.target.error);
        });
    }
    async getAllProtocols() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction('protocols','readonly');
            const request = tx.objectStore('protocols').getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    async getProtocolWithPhotos(protocolId) {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols','photos'],'readonly');
            const protocolStore = tx.objectStore('protocols');
            const photoStore = tx.objectStore('photos');
            protocolStore.get(protocolId).onsuccess = async (e) => {
                const protocol = e.target.result;
                if (protocol && protocol.remarks) {
                    for (let i=0; i<protocol.remarks.length; i++) {
                        const remark = protocol.remarks[i];
                        if (remark.photoId) {
                            await new Promise((rp) => {
                                photoStore.get(remark.photoId).onsuccess = (pe) => {
                                    const photo = pe.target.result;
                                    if (photo) { remark.photoData=photo.photoData; remark.photoBlob=photo.photoBlob; }
                                    rp();
                                };
                            });
                        }
                    }
                }
                resolve(protocol);
            };
            tx.onerror = (e) => reject(e.target.error);
        });
    }
    async clearAllProtocols() {
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(['protocols','photos'],'readwrite');
            Promise.all([
                new Promise((r) => { tx.objectStore('protocols').clear().onsuccess = r; }),
                new Promise((r) => { tx.objectStore('photos').clear().onsuccess = r; })
            ]).then(resolve).catch(reject);
        });
    }
}

// =================== AutoSaveManager ===================
class AutoSaveManager {
    constructor(storage) { this.storage=storage; this.saveTimeout=null; this.pendingChanges=false; this.currentProtocolId=null; this.autoSaveInterval=null; this.isSaving=false; }
    startAutoSave(interval=10000) {
        this.autoSaveInterval = setInterval(() => {
            if (this.pendingChanges && !this.isSaving) this.saveCurrentState();
        }, interval);
    }
    stopAutoSave() { if (this.autoSaveInterval) clearInterval(this.autoSaveInterval); }
    async saveCurrentState() {
        if (this.isSaving) return;
        this.isSaving = true;
        setAutosaveStatus('saving', 'Сохранение...');
        const data = this.collectFormData();
        try {
            if (this.currentProtocolId) data.id = this.currentProtocolId;
            const protocolId = await this.storage.saveProtocol(data);
            this.currentProtocolId = protocolId;
            this.pendingChanges = false;
            setAutosaveStatus('saved', 'Сохранено');
            this.updateSaveStatus('✅ Протокол успешно сохранен','success');
        } catch(error) {
            console.error('Ошибка автосохранения:',error);
            setAutosaveStatus('error','Ошибка');
            this.updateSaveStatus('❌ Ошибка сохранения протокола','error');
            this.saveToLocalStorage(data);
        } finally { this.isSaving = false; }
    }
    saveToLocalStorage(data) {
        try {
            const lightData = JSON.parse(JSON.stringify(data));
            if (lightData.remarks) lightData.remarks.forEach(r => { if(r.photoData){r.photoData='[ФОТО УДАЛЕНО]'; r.photoBlob=null;} });
            const backup = JSON.stringify({ data:lightData, timestamp:new Date().toISOString() });
            if (backup.length > 4*1024*1024) { this.updateSaveStatus('⚠️ Файл слишком большой для резервного копирования','warning'); return; }
            let backups = [];
            const stored = localStorage.getItem('checklist_backups');
            if (stored) { try { backups = JSON.parse(stored); if(!Array.isArray(backups)) backups=[]; } catch(e){backups=[];} }
            backups.unshift({ id:`backup_${Date.now()}`, data:lightData, timestamp:new Date().toISOString() });
            if (backups.length > 2) backups = backups.slice(0,2);
            localStorage.setItem('checklist_backups', JSON.stringify(backups));
            this.updateSaveStatus('⚠️ Сохранено в localStorage (резервная копия)','warning');
        } catch(e) {
            if (e.name === 'QuotaExceededError') { localStorage.removeItem('checklist_backups'); this.updateSaveStatus('❌ Место в localStorage закончилось','error'); }
            else this.updateSaveStatus('❌ Ошибка: не удалось сохранить резервную копию','error');
        }
    }
    collectFormData() {
        const data = { date:document.getElementById('date').value, group:document.getElementById('group').value, route:document.getElementById('route').value, remarks:[] };
        document.querySelectorAll('.remark').forEach((remark, index) => {
            const remarkId = remark.id;
            const remarkNumber = index + 1;
            const description = document.getElementById(`description-${remarkId}`)?.value || '';
            const responsibleSelect = document.getElementById(`responsible-${remarkNumber}`);
            const customResponsibleInput = document.getElementById(`custom-responsible-${remarkId}`);
            let responsible = '';
            if (responsibleSelect && responsibleSelect.value === 'custom') responsible = customResponsibleInput?.value || '';
            else if (responsibleSelect) responsible = responsibleSelect.value || '';
            const locationSelect = document.getElementById(`location-${remarkId}`);
            const customLocationInput = document.getElementById(`custom-location-${remarkId}`);
            let location = '';
            if (locationSelect && locationSelect.value === 'custom') location = customLocationInput?.value || '';
            else if (locationSelect) location = locationSelect.value || '';
            const directionSelect = document.getElementById(`direction-${remarkId}`);
            const direction = directionSelect?.value || '';
            data.remarks.push({ index, description, responsible, location, direction, photoData:remark.getAttribute('data-photo-base64'), photoBlob:remark.getAttribute('data-photo-blob') });
        });
        return data;
    }
    updateSaveStatus(text, type) {
        showToast(text, type);
    }
}

function updateLocationSelect(remarkId) {
    const locationSelect = document.getElementById(`location-${remarkId}`);

    const options = ['Территория возле КПП', 'Склад ТМЦ'];

    locationSelect.innerHTML = '';
    options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        locationSelect.appendChild(o);
    });
    const customOpt = document.createElement('option');

function loadPhotoFromFile(remarkNumber, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width=img.width; canvas.height=img.height;
            canvas.getContext('2d').drawImage(img,0,0);
            const compressedDataUrl = compressPhoto(canvas,1024,0.6);
            const remarkId = `remark-${remarkNumber}`;
            const remark = document.getElementById(remarkId);
            const preview = document.getElementById(`photo-preview-${remarkId}`);
            const photoActions = document.getElementById(`photo-actions-${remarkId}`);
            const photoBtn = document.getElementById(`photo-btn-${remarkNumber}`);
            remark.setAttribute('data-photo-base64', compressedDataUrl);
            fetch(compressedDataUrl).then(r=>r.blob()).then(blob=>{
                const rb=new FileReader();
                rb.onloadend=function(){ remark.setAttribute('data-photo-blob',rb.result); if(autoSaveManager) autoSaveManager.pendingChanges=true; };
                rb.readAsDataURL(blob);
            });
            preview.innerHTML='';
            const imgEl=document.createElement('img');
            imgEl.src=compressedDataUrl; imgEl.alt=`Фото замечания ${remarkNumber}`;
            imgEl.style.maxWidth='100%'; imgEl.style.maxHeight='200px'; imgEl.style.objectFit='contain';
            imgEl.onclick=function(){ zoomPhoto(this); };
            preview.appendChild(imgEl);
            photoActions.style.display='flex';
            photoBtn.textContent='✅ Фото добавлено'; photoBtn.disabled=true;
            if (autoSaveManager) { autoSaveManager.pendingChanges=true; autoSaveManager.saveCurrentState(); }
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
    input.value='';
}

function initCamera(remarkNumber) {
    const video = document.getElementById(`video-${remarkNumber}`);
    if (!video) return;
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } })
    .then(stream => {
        video.srcObject = stream;
        video.play().catch(e => console.error('Ошибка видео:',e));
        setTimeout(() => applyFlashSettings(remarkNumber), 500);
    })
    .catch(err => {
        console.error('Камера недоступна:',err);
        video.style.display='none';
        const btn = document.getElementById(`photo-btn-${remarkNumber}`);
        if (btn) { btn.disabled=true; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34"/></svg> Камера недоступна'; }
        const flashBtn = document.getElementById(`flash-btn-${remarkNumber}`);
        if (flashBtn) flashBtn.disabled=true;
    });
}

function takePhoto(remarkNumber) {
    const video = document.getElementById(`video-${remarkNumber}`);
    const remarkId = `remark-${remarkNumber}`;
    const preview = document.getElementById(`photo-preview-${remarkId}`);
    const remark = document.getElementById(remarkId);
    const photoActions = document.getElementById(`photo-actions-${remarkId}`);
    if (!video || !video.videoWidth || video.videoWidth===0) { showToast('Камера не готова. Подождите...','warning'); return; }
    const useFlash = flashStates.get(remarkId) || false;
    let flashPromise = Promise.resolve();
    if (useFlash) {
        const track = video.srcObject?.getVideoTracks()[0];
        if (track && track.getCapabilities && track.getCapabilities().torch)
            flashPromise = track.applyConstraints({ advanced:[{torch:true}] });
    }
    flashPromise.then(() => new Promise(res=>setTimeout(res,300))).then(() => {
        const canvas = document.createElement('canvas');
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        canvas.getContext('2d').drawImage(video,0,0,video.videoWidth,video.videoHeight);
        const isPortrait = video.videoHeight > video.videoWidth;
        remark.setAttribute('data-photo-orientation', isPortrait?'portrait':'landscape');
        remark.setAttribute('data-photo-width', video.videoWidth);
        remark.setAttribute('data-photo-height', video.videoHeight);
        const photoDataUrl = compressPhoto(canvas,1024,0.6);
        const img = document.createElement('img');
        img.src=photoDataUrl; img.alt=`Фото замечания ${remarkNumber}`;
        img.style.maxWidth='100%'; img.style.maxHeight='220px'; img.style.objectFit='contain';
        img.onclick=function(){ zoomPhoto(this); };
        preview.innerHTML=''; preview.appendChild(img);
        photoActions.style.display='flex';
        remark.setAttribute('data-photo-base64', photoDataUrl);
        fetch(photoDataUrl).then(r=>r.blob()).then(blob=>{
            const reader = new FileReader();
            reader.onloadend=function(){
                remark.setAttribute('data-photo-blob', reader.result);
                if (autoSaveManager) { autoSaveManager.pendingChanges=true; autoSaveManager.saveCurrentState(); }
            };
            reader.readAsDataURL(blob);
        });
        const btn = document.getElementById(`photo-btn-${remarkNumber}`);
        btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Фото сделано';
        btn.disabled=true;
        if (useFlash) {
            const track = video.srcObject?.getVideoTracks()[0];
            if (track && track.getCapabilities && track.getCapabilities().torch)
                setTimeout(() => track.applyConstraints({ advanced:[{torch:useFlash}] }), 500);
        }
    }).catch(error => { console.error('Ошибка фото:',error); showToast('Ошибка при съемке фото','error'); });
}

// Flash toggle
function toggleFlash(remarkNumber) {
    const remarkId = `remark-${remarkNumber}`;
    const currentState = flashStates.get(remarkId) || false;
    const newState = !currentState;
    flashStates.set(remarkId, newState);
    applyFlashSettings(remarkNumber);
    const btn = document.getElementById(`flash-btn-${remarkNumber}`);
    if (btn) {
        btn.classList.toggle('on', newState);
        btn.classList.toggle('off', !newState);
    }
}

function applyFlashSettings(remarkNumber) {
    const remarkId = `remark-${remarkNumber}`;
    const video = document.getElementById(`video-${remarkNumber}`);
    const useFlash = flashStates.get(remarkId) || false;
    if (!video || !video.srcObject) return;
    const track = video.srcObject.getVideoTracks()[0];
    if (track && track.getCapabilities && track.getCapabilities().torch) {
        track.applyConstraints({ advanced:[{torch:useFlash}] }).catch(()=>{});
    }
}

// =================== VOICE (код из GEMBA_OZTY) ===================
function startVoiceInput(remarkId) {
    const statusDiv = document.getElementById(`status-${remarkId}`);
    const startBtn = document.getElementById(`start-btn-${remarkId}`);
    const stopBtn = document.getElementById(`stop-btn-${remarkId}`);
    const clearBtn = document.getElementById(`clear-btn-${remarkId}`);
    const textarea = document.getElementById(`description-${remarkId}`);
    const replaceControls = document.getElementById(`replace-controls-${remarkId}`);
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { showToast('Браузер не поддерживает распознавание речи. Используйте Chrome или Edge.','error'); return; }
    if (recognitions.has(remarkId)) { const oldRec=recognitions.get(remarkId); if(oldRec) oldRec.stop(); recognitions.delete(remarkId); }
    if (!voiceStates.has(remarkId)) {
        voiceStates.set(remarkId, { currentText:textarea.value||'', tempText:'', isRecording:false, shouldReplace:false, lastFinalText:'', lastProcessedText:'', duplicatePrevention:[] });
    }
    const state = voiceStates.get(remarkId);
    state.tempText=''; state.isRecording=true; state.shouldReplace=false; state.lastFinalText=''; state.lastProcessedText=''; state.duplicatePrevention=[];
    const recognition = new SpeechRecognition();
    recognition.lang='ru-RU'; recognition.interimResults=true; recognition.continuous=false; recognition.maxAlternatives=1;
    function isDuplicateText(newText, existingText) {
        if (!newText||!existingText) return false;
        const newWords=newText.toLowerCase().split(/\s+/).filter(w=>w.length>3);
        const existingWords=existingText.toLowerCase().split(/\s+/).filter(w=>w.length>3);
        if (newWords.length<2||existingWords.length<2) return false;
        let dup=0;
        for (const w of newWords) if (existingWords.includes(w)) dup++;
        return dup/newWords.length > 0.7;
    }
    recognition.onstart = function() {
        statusDiv.style.display='flex';
        document.getElementById(`status-text-${remarkId}`).textContent='🎤 Слушаю... Говорите четко и медленно';
        statusDiv.classList.add('recording');
        startBtn.disabled=true; stopBtn.disabled=false; clearBtn.disabled=true;
        replaceControls.style.display='none';
        if (textarea.value.trim()) textarea.classList.add('text-replace-mode');
    };
    recognition.onresult = function(event) {
        const state = voiceStates.get(remarkId);
        if (!state) return;
        let finalTranscript='', interimTranscript='';
        for (let i=0; i<event.results.length; i++) {
            const result=event.results[i];
            const transcript=result[0].transcript.trim();
            if (result.isFinal) finalTranscript+=(finalTranscript?' ':'')+transcript;
            else interimTranscript+=(interimTranscript?' ':'')+transcript;
        }
        const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            if (finalTranscript) {
                const processedText=finalTranscript.trim();
                if (processedText && processedText!==state.lastProcessedText) {
                    let isDuplicate=false;
                    for (const prevText of state.duplicatePrevention) { if(isDuplicateText(processedText,prevText)){isDuplicate=true;break;} }
                    if (!isDuplicate) { state.tempText=processedText; state.lastProcessedText=processedText; state.duplicatePrevention.push(processedText); if(state.duplicatePrevention.length>5) state.duplicatePrevention.shift(); textarea.value=processedText; }
                }
            }
        } else {
            state.tempText=finalTranscript||interimTranscript;
            if (state.tempText) textarea.value=state.tempText;
        }
    };
    recognition.onerror = function(event) {
        console.error('Ошибка распознавания:',event.error);
        const statusText = document.getElementById(`status-text-${remarkId}`);
        if (event.error==='no-speech') statusText.textContent='Речь не обнаружена. Попробуйте снова';
        else if (event.error==='audio-capture') statusText.textContent='Микрофон недоступен';
        else if (event.error==='not-allowed') statusText.textContent='Доступ к микрофону запрещен';
        else statusText.textContent='Ошибка: '+event.error;
        statusDiv.style.borderLeftColor='var(--red)';
        statusDiv.style.background='#fff5f5';
        statusDiv.style.color='var(--red)';
        statusDiv.classList.remove('recording');
        startBtn.disabled=false; stopBtn.disabled=true; clearBtn.disabled=false;
        const state=voiceStates.get(remarkId);
        if (state) state.isRecording=false;
        recognitions.delete(remarkId);
        textarea.classList.remove('text-replace-mode');
    };
    recognition.onend = function() {
        const state=voiceStates.get(remarkId);
        if (!state) return;
        if (state.isRecording) {
            setTimeout(() => {
                if (state.isRecording && !recognitions.has(remarkId)) {
                    try { recognition.start(); return; } catch(e){console.log('Не удалось перезапустить');}
                }
            }, 300);
            return;
        }
        state.isRecording=false;
        if (state.tempText && state.tempText.trim()) {
            const statusText=document.getElementById(`status-text-${remarkId}`);
            statusText.textContent='✅ Распознано. Выберите действие:';
            statusDiv.style.borderLeftColor='var(--green)';
            statusDiv.style.background='#f0fdf4';
            statusDiv.style.color='var(--green-d)';
            replaceControls.style.display='flex';
            state.currentText=textarea.value;
        } else {
            statusDiv.style.display='none';
            startBtn.disabled=false; stopBtn.disabled=true; clearBtn.disabled=false;
        }
        statusDiv.classList.remove('recording');
        textarea.classList.remove('text-replace-mode');
        recognitions.delete(remarkId);
    };
    recognitions.set(remarkId, recognition);
    try { recognition.start(); }
    catch(error) {
        console.error('Ошибка запуска:',error);
        const statusText=document.getElementById(`status-text-${remarkId}`);
        statusText.textContent='Не удалось начать распознавание';
        statusDiv.style.display='flex';
        if (state) state.isRecording=false;
    }
}

function addToExistingText(remarkId) {
    const textarea=document.getElementById(`description-${remarkId}`);
    const state=voiceStates.get(remarkId);
    const replaceControls=document.getElementById(`replace-controls-${remarkId}`);
    if (state && state.tempText) {
        const currentText=state.currentText||'';
        const newText=state.tempText.trim();
        textarea.value = (currentText && newText) ? currentText+' '+newText : (newText||currentText);
        state.currentText=textarea.value; state.tempText='';
    }
    replaceControls.style.display='none';
    _resetVoiceUI(remarkId);
    if (autoSaveManager) autoSaveManager.pendingChanges=true;
}

function replaceExistingText(remarkId) {
    const textarea=document.getElementById(`description-${remarkId}`);
    const state=voiceStates.get(remarkId);
    const replaceControls=document.getElementById(`replace-controls-${remarkId}`);
    if (state && state.tempText) { textarea.value=state.tempText.trim(); state.currentText=textarea.value; state.tempText=''; }
    replaceControls.style.display='none';
    _resetVoiceUI(remarkId);
    if (autoSaveManager) autoSaveManager.pendingChanges=true;
}

function _resetVoiceUI(remarkId) {
    document.getElementById(`status-${remarkId}`).style.display='none';
    document.getElementById(`start-btn-${remarkId}`).disabled=false;
    document.getElementById(`stop-btn-${remarkId}`).disabled=true;
    document.getElementById(`clear-btn-${remarkId}`).disabled=false;
}

function stopVoiceInput(remarkId) {
    const state=voiceStates.get(remarkId);
    if (state) state.isRecording=false;
    if (recognitions.has(remarkId)) { const r=recognitions.get(remarkId); if(r) r.stop(); recognitions.delete(remarkId); }
    document.getElementById(`status-${remarkId}`).style.display='none';
    _resetVoiceUI(remarkId);
    document.getElementById(`replace-controls-${remarkId}`).style.display='none';
    document.getElementById(`description-${remarkId}`).classList.remove('text-replace-mode');
}

function clearVoiceInput(remarkId) {
    document.getElementById(`description-${remarkId}`).value='';
    const state=voiceStates.get(remarkId);
    if (state) { state.currentText=''; state.tempText=''; state.duplicatePrevention=[]; }
    if (autoSaveManager) autoSaveManager.pendingChanges=true;
}

// =================== ONLINE/OFFLINE ===================
function updateOnlineStatus() {
    const badge=document.getElementById('offlineBadge');
    const dot=document.getElementById('status-dot');
    const text=document.getElementById('status-text');
    if (navigator.onLine) {
        badge.classList.remove('show');
        dot.classList.remove('offline');
        if (text) text.textContent='Онлайн';
    } else {
        badge.classList.add('show');
        dot.classList.add('offline');
        if (text) text.textContent='Офлайн';
    }
}

// =================== RESTORE ===================
async function restoreLastProtocol() {
    try {
        const lastProtocol = await offlineStorage.loadLastProtocol();
        if (lastProtocol) {
            const shouldRestore = confirm(`Найден несохраненный протокол от ${new Date(lastProtocol.savedAt).toLocaleString()}. Восстановить?`);
            if (shouldRestore) { loadProtocolData(lastProtocol); showToast('✅ Протокол восстановлен','success'); }
        }
    } catch(error) { console.error('Ошибка восстановления:',error); }
}

function loadProtocolData(protocol) {
    document.getElementById('date').value=protocol.date||'';
    document.getElementById('group').value=protocol.group||'';
    document.getElementById('route').value=protocol.route||'';
    if (protocol.remarks && protocol.remarks.length > 0) {
        document.getElementById('remarks').innerHTML='';
        remarkCount=0;
        protocol.remarks.forEach((remarkData, index) => {
            addRemark();
            const remarkId=`remark-${index+1}`;
            setTimeout(() => {
                const descField=document.getElementById(`description-${remarkId}`);
                if (descField && remarkData.description) descField.value=remarkData.description;
                const responsibleSelect=document.getElementById(`responsible-${index+1}`);
                const customResponsibleInput=document.getElementById(`custom-responsible-${remarkId}`);
                if (responsibleSelect && remarkData.responsible) {
                    const isStd=Array.from(responsibleSelect.options).some(o=>o.value===remarkData.responsible);
                    if (isStd) responsibleSelect.value=remarkData.responsible;
                    else { responsibleSelect.value='custom'; customResponsibleInput.style.display='block'; customResponsibleInput.value=remarkData.responsible; }
                }
                const locationSelect=document.getElementById(`location-${remarkId}`);
                const customLocationInput=document.getElementById(`custom-location-${remarkId}`);
                if (locationSelect && remarkData.location) {
                    updateLocationSelect(remarkId);
                    setTimeout(() => {
                        const isStd=Array.from(locationSelect.options).some(o=>o.value===remarkData.location);
                        if (isStd) locationSelect.value=remarkData.location;
                        else { locationSelect.value='custom'; customLocationInput.style.display='block'; customLocationInput.value=remarkData.location; }
                    }, 100);
                }
                const directionSelect=document.getElementById(`direction-${remarkId}`);
                if (directionSelect && remarkData.direction) directionSelect.value=remarkData.direction;
                if (remarkData.photoData) restorePhoto(remarkId, remarkData);
            }, 100);
        });
    }
    if (autoSaveManager) { autoSaveManager.currentProtocolId=protocol.id; autoSaveManager.pendingChanges=false; }
}

function restorePhoto(remarkId, remarkData) {
    const remark=document.getElementById(remarkId);
    const preview=document.getElementById(`photo-preview-${remarkId}`);
    const photoActions=document.getElementById(`photo-actions-${remarkId}`);
    const remarkNumber=remarkId.split('-')[1];
    const photoBtn=document.getElementById(`photo-btn-${remarkNumber}`);
    if (remarkData.photoData) remark.setAttribute('data-photo-base64', remarkData.photoData);
    if (remarkData.photoBlob) remark.setAttribute('data-photo-blob', remarkData.photoBlob);
    const img=document.createElement('img');
    img.src=remarkData.photoData||remarkData.photoBlob; img.alt='Фото';
    img.style.maxWidth='100%'; img.style.maxHeight='200px'; img.style.objectFit='contain';
    img.onclick=function(){ zoomPhoto(this); };
    preview.innerHTML=''; preview.appendChild(img);
    photoActions.style.display='flex';
    if (photoBtn) { photoBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Фото сделано'; photoBtn.disabled=true; }
}

// =================== MANUAL SAVE ===================
async function manualSave() {
    if (autoSaveManager) {
        autoSaveManager.pendingChanges=true;
        await autoSaveManager.saveCurrentState();
    }
}

// =================== HISTORY / BACKUPS ===================
async function showBackups() {
    const modal=document.getElementById('historyModal');
    const listEl=document.getElementById('backupList');
    modal.style.display='flex';
    listEl.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-hint)">Загрузка...</div>';
    try {
        let protocols=[];
        if (offlineStorage) protocols=await offlineStorage.getAllProtocols();
        let backupsLS=[];
        const stored=localStorage.getItem('checklist_backups');
        if (stored) { try { backupsLS=JSON.parse(stored); if(!Array.isArray(backupsLS)) backupsLS=[]; } catch(e){backupsLS=[];} }
        const allProtocols=[...protocols,...backupsLS.map(b=>({...b.data,savedAt:b.timestamp,id:b.id,source:'localStorage'}))];
        allProtocols.sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
        if (allProtocols.length===0) {
            listEl.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-hint)">История пуста</div>';
            return;
        }
        listEl.innerHTML='';
        allProtocols.forEach(protocol => {
            const item=document.createElement('div');
            item.className='backup-item';
            const date=new Date(protocol.savedAt);
            const isLS=protocol.source==='localStorage';
            item.innerHTML=`
                <div class="date">${date.toLocaleString('ru-RU')} ${isLS?'<span style="font-size:11px;color:var(--orange);font-weight:600">резерв</span>':''}</div>
                <div class="stats">
                    ${protocol.date?'📅 '+protocol.date+' • ':''} 
                    ${protocol.group?'👥 '+protocol.group+' • ':''}
                    ${protocol.route?'🗺 '+protocol.route.substring(0,30)+'... • ':''}
                    ${(protocol.remarks?protocol.remarks.length:0)} замечаний
                </div>
            `;
            item.onclick=async () => {
                let fullProtocol=protocol;
                if (!isLS && offlineStorage) fullProtocol=await offlineStorage.getProtocolWithPhotos(protocol.id)||protocol;
                loadProtocolData(fullProtocol);
                closeHistoryModal();
                showToast('Протокол загружен','success');
            };
            listEl.appendChild(item);
        });
    } catch(error) {
        console.error('Ошибка загрузки истории:',error);
        listEl.innerHTML='<div style="text-align:center;padding:24px;color:var(--red)">Ошибка загрузки</div>';
    }
}

function closeHistoryModal() { document.getElementById('historyModal').style.display='none'; }

async function clearHistory() {
    if (!confirm('Удалить всю историю протоколов? Это действие нельзя отменить.')) return;
    try {
        if (offlineStorage) await offlineStorage.clearAllProtocols();
        localStorage.removeItem('checklist_backups');
        showToast('История очищена','success');
        closeHistoryModal();
    } catch(error) { showToast('Ошибка очистки истории','error'); }
}

// =================== EXPORT EXCEL ===================
async function exportExcelWithImages() {
    if (!navigator.onLine) {
        showToast('Вы в офлайн-режиме. Экспорт недоступен.','warning');
        return;
    }
    const date=document.getElementById('date').value;
    const group=document.getElementById('group').value;
    const route=document.getElementById('route').value;
    const remarks=document.querySelectorAll('.remark');
    if (remarks.length===0) { showToast('Нет замечаний для экспорта','warning'); return; }
    document.getElementById('loading').style.display='flex';
    try {
        const workbook=new ExcelJS.Workbook();
        workbook.creator='Чек-лист обхода'; workbook.created=new Date();
        const worksheet=workbook.addWorksheet('Протокол обхода');
        
        // Header styling
        const headerFill={ type:'pattern', pattern:'solid', fgColor:{argb:'FF001355'} };
        const headerFont={ color:{argb:'FFFFFFFF'}, bold:true, size:11 };
        const headerAlignment={ vertical:'middle', horizontal:'center', wrapText:true };

        // Title rows
        worksheet.mergeCells('A1:H1');
        const titleCell=worksheet.getCell('A1');
        titleCell.value='ПРОТОКОЛ ОБХОДА'; titleCell.font={bold:true,size:14,color:{argb:'FF001355'}}; titleCell.alignment={horizontal:'center',vertical:'middle'};
        worksheet.getRow(1).height=30;

        worksheet.mergeCells('A2:B2'); worksheet.getCell('A2').value='Дата обхода:'; worksheet.getCell('A2').font={bold:true};
        worksheet.mergeCells('C2:D2'); worksheet.getCell('C2').value=date;
        worksheet.mergeCells('E2:F2'); worksheet.getCell('E2').value='Группа:'; worksheet.getCell('E2').font={bold:true};
        worksheet.mergeCells('G2:H2'); worksheet.getCell('G2').value=group;

        worksheet.mergeCells('A3:B3'); worksheet.getCell('A3').value='Маршрут:'; worksheet.getCell('A3').font={bold:true};
        worksheet.mergeCells('C3:H3'); worksheet.getCell('C3').value=route;

        worksheet.addRow([]);
        worksheet.addRow([]);
        worksheet.addRow([]);

        // Column widths
        worksheet.columns=[
            {key:'num',width:6},{key:'photo',width:45},{key:'description',width:40},
            {key:'responsible',width:22},{key:'location',width:20},{key:'direction',width:22},
            {key:'status',width:16},{key:'notes',width:30}
        ];

        // Table header
        const headerRow=worksheet.getRow(7);
        const headers=['№','Фото','Описание замечания','Ответственный','Место обнаружения','Направление','Статус','Примечания'];
        headers.forEach((h,i) => {
            const cell=headerRow.getCell(i+1);
            cell.value=h; cell.fill=headerFill; cell.font=headerFont; cell.alignment=headerAlignment;
            cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
        });
        headerRow.height=36;

        let currentRow=8;
        const statusColumnLetter='G';

        for (let i=0; i<remarks.length; i++) {
            const remark=remarks[i];
            const remarkId=remark.id;
            const remarkNumber=i+1;
            const description=document.getElementById(`description-${remarkId}`)?.value||'';
            const responsibleSelect=document.getElementById(`responsible-${remarkNumber}`);
            const customResponsibleInput=document.getElementById(`custom-responsible-${remarkId}`);
            let responsible='';
            if (responsibleSelect&&responsibleSelect.value==='custom') responsible=customResponsibleInput?.value||'';
            else if (responsibleSelect) responsible=responsibleSelect.value||'';
            const locationSelect=document.getElementById(`location-${remarkId}`);
            const customLocationInput=document.getElementById(`custom-location-${remarkId}`);
            let location='';
            if (locationSelect&&locationSelect.value==='custom') location=customLocationInput?.value||'';
            else if (locationSelect) location=locationSelect.value||'';
            const direction=document.getElementById(`direction-${remarkId}`)?.value||'';
            const hasPhoto=remark.hasAttribute('data-photo-base64')||remark.hasAttribute('data-photo-blob');
            
            const row=worksheet.getRow(currentRow);
            row.getCell(1).value=remarkNumber;
            row.getCell(1).alignment={vertical:'middle',horizontal:'center'};
            row.getCell(3).value=description;
            row.getCell(3).alignment={vertical:'top',wrapText:true};
            row.getCell(4).value=responsible;
            row.getCell(4).alignment={vertical:'middle',wrapText:true};
            row.getCell(5).value=location;
            row.getCell(5).alignment={vertical:'middle'};
            row.getCell(6).value=direction;
            row.getCell(6).alignment={vertical:'middle'};
            row.getCell(7).value='Не рассмотрено';
            row.getCell(7).alignment={vertical:'middle',horizontal:'center'};
            row.height=120;

            // Conditional formatting for status column
            const statusRef=`${statusColumnLetter}${currentRow}`;
            [
                {text:'Выполнено',fgColor:'FFCCFFCC',fontColor:'FF006100'},
                {text:'В работе',fgColor:'FFFFEB9C',fontColor:'FF9C5700'},
                {text:'Отклонено',fgColor:'FFF2F2F2',fontColor:'FF7F7F7F'}
            ].forEach(s=>{
                worksheet.addConditionalFormatting({ref:statusRef,rules:[{type:'containsText',operator:'containsText',text:s.text,style:{fill:{type:'pattern',pattern:'solid',fgColor:{argb:s.fgColor}},font:{color:{argb:s.fontColor},bold:true}}}]});
            });

            if (hasPhoto) {
                const photoBlob=remark.getAttribute('data-photo-blob');
                try {
                    const base64Data=photoBlob.split(',')[1];
                    const imageBuffer=Uint8Array.from(atob(base64Data),c=>c.charCodeAt(0));
                    const origWidth=parseInt(remark.getAttribute('data-photo-width'))||0;
                    const origHeight=parseInt(remark.getAttribute('data-photo-height'))||0;
                    const imageId=workbook.addImage({buffer:imageBuffer,extension:'jpeg'});
                    const maxW=300,maxH=400;
                    let tW=origWidth,tH=origHeight;
                    if (origWidth>0&&origHeight>0) {
                        const scale=Math.min(maxW/origWidth,maxH/origHeight);
                        tW=Math.round(origWidth*scale); tH=Math.round(origHeight*scale);
                    } else { tW=300; tH=200; }
                    const excelRowH=Math.max(120,Math.round(tH*0.75)+20);
                    row.height=excelRowH;
                    const cellW=45*7, cellH=excelRowH*0.75;
                    const offsetX=Math.max(0,Math.round((cellW-tW)/2));
                    const offsetY=Math.max(0,Math.round((cellH-tH)/2));
                    worksheet.addImage(imageId,{tl:{col:1,row:currentRow-1,offsetX,offsetY},ext:{width:tW,height:tH}});
                    row.getCell(2).value='';
                } catch(error) { console.error('Ошибка фото:',error); row.getCell(2).value='Ошибка фото'; row.getCell(2).alignment={vertical:'middle',horizontal:'center'}; }
            } else { row.getCell(2).value='Нет фото'; row.getCell(2).alignment={vertical:'middle',horizontal:'center'}; }
            currentRow++;
        }

        for (let i=8; i<currentRow; i++) {
            const row=worksheet.getRow(i);
            for (let j=1; j<=8; j++) {
                row.getCell(j).border={top:{style:'thin',color:{argb:'FF001355'}},left:{style:'thin',color:{argb:'FF001355'}},bottom:{style:'thin',color:{argb:'FF001355'}},right:{style:'thin',color:{argb:'FF001355'}}};
            }
        }

        worksheet.views=[{state:'normal',showGridLines:true}];
        const fileName=`Протокол_обхода_${date}_${group.replace(/\s+/g,'_')}.xlsx`;
        const buffer=await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fileName);
        document.getElementById('loading').style.display='none';
        showToast(`Протокол "${fileName}" успешно сохранён`,'success');
    } catch(error) {
        console.error('Ошибка Excel:',error);
        document.getElementById('loading').style.display='none';
        showToast(!navigator.onLine?'Офлайн-режим. Экспорт недоступен.':'Ошибка при создании файла.','error');
    }
}

// =================== CLOUD SAVE ===================
const CLOUD_WEBHOOK_URL='https://esz-polyplastic.cloudpub.ru/webhook/gemba-ozty';

async function sendToCloud() {
    const cloudBtn=document.getElementById('cloudSaveBtn');
    const originalHTML=cloudBtn.innerHTML;
    cloudBtn.disabled=true;
    cloudBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> Отправка...';
    document.getElementById('loading').style.display='flex';
    try {
        const data={
            date:document.getElementById('date').value,
            group_name:document.getElementById('group').value,
            route:document.getElementById('route').value,
            remarks:[]
        };
        const remarksElements=document.querySelectorAll('.remark');
        for (let i=0; i<remarksElements.length; i++) {
            const remark=remarksElements[i];
            const remarkId=remark.id;
            const remarkNumber=i+1;
            const description=document.getElementById(`description-${remarkId}`)?.value||'';
            const responsibleSelect=document.getElementById(`responsible-${remarkNumber}`);
            const customResponsibleInput=document.getElementById(`custom-responsible-${remarkId}`);
            let responsible='';
            if (responsibleSelect&&responsibleSelect.value==='custom') responsible=customResponsibleInput?.value||'';
            else if (responsibleSelect) responsible=responsibleSelect.value||'';
            const locationSelect=document.getElementById(`location-${remarkId}`);
            const customLocationInput=document.getElementById(`custom-location-${remarkId}`);
            let location='';
            if (locationSelect&&locationSelect.value==='custom') location=customLocationInput?.value||'';
            else if (locationSelect) location=locationSelect.value||'';
            const direction=document.getElementById(`direction-${remarkId}`)?.value||'';
            let photoBase64=null;
            if (remark.hasAttribute('data-photo-base64')) photoBase64=remark.getAttribute('data-photo-base64');
            else if (remark.hasAttribute('data-photo-blob')) photoBase64=remark.getAttribute('data-photo-blob');
            data.remarks.push({description,responsible,location,direction,photo_base64:photoBase64});
        }
        const response=await fetch(CLOUD_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if (!response.ok) { const errText=await response.text(); throw new Error(`HTTP ${response.status}: ${errText}`); }
        await response.json();
        showToast('Протокол успешно отправлен в облако','success');
    } catch(error) {
        console.error('Ошибка облака:',error);
        showToast(`Не удалось сохранить в облако: ${error.message}`,'error');
    } finally {
        document.getElementById('loading').style.display='none';
        cloudBtn.disabled=false;
        cloudBtn.innerHTML=originalHTML;
    }
}
